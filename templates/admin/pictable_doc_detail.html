{% extends "admin/base_site.html" %}

{% block breadcrumbs %}
<div class="breadcrumbs">
  <a href="{% url 'admin:index' %}">Home</a>
  &rsaquo; <a href="{% url 'admin:pictable_docs_index' %}">프로젝트 문서</a>
  &rsaquo; {{ doc.title }}
</div>
{% endblock %}

{% block content %}
<div id="content-main">
  <h1>{{ doc.title }}</h1>
  <p>{{ doc.description }}</p>

  {% if doc.type == "html" %}
    <p>
      <a class="button" href="{{ raw_url }}" target="_blank" rel="noopener noreferrer">새 탭에서 원문 열기</a>
    </p>
    <iframe
      title="{{ doc.title }}"
      src="{{ raw_url }}"
      style="width: 100%; min-height: 78vh; border: 1px solid var(--border-color); border-radius: 8px; background: #fff;"
    ></iframe>
  {% else %}
    <pre style="white-space: pre-wrap; padding: 24px; border: 1px solid var(--border-color); border-radius: 8px; background: var(--body-bg);">{{ doc_content }}</pre>
  {% endif %}
</div>
{% endblock %}
